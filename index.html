<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Testing</title>
</head>
<body>
    <div class="card">
        <h1>User login page</h1>
        <form action="https://login-page-project-backend.onrender.com/open-sesame" method="POST">
            <div class="layer">
                <div class="dhurandhar"><input name="name" id="name" class="boxs" type="text" required><label for="name">Name</label></div>
                <div class="dhurandhar"><input name="email" id="email" class="boxs" type="email" required><label for="email">Email</label></div>
                <div class="dhurandhar"><input name="phone" id="phone" class="boxs" type="tel" required><label for="phone">Phone number </label></div>
            </div>
            <button class="btn">Login</button>
            <marquee>Welcome to the login page!!</marquee>
        </form>
    </div>
    <script src="login.js"></script>
</body>
</html>
